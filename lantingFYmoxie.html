<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>《兰亭集序》默写通关</title>
    <style>
        /* 颜色与字体设定 */
        :root {
            --bg-color: #F5F5EC;
            --text-main: #333333;
            --text-muted: #888888;
            --accent-green: #6A8B47;
            --line-color: #D3D3C8;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: "STZhongsong", "SimSun", "Songti SC", serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        #app {
            width: 100%;
            max-width: 600px;
            padding: 20px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
        }

        /* 顶部状态栏 */
        .header {
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            color: var(--text-muted);
            margin-bottom: 40px;
            margin-top: 10px;
        }

        .title-area {
            text-align: center;
            margin-bottom: 40px;
        }

        .title-area h1 {
            font-size: 28px;
            font-weight: normal;
            margin: 0 0 10px 0;
            letter-spacing: 2px;
        }

        .title-area p {
            font-size: 14px;
            color: var(--text-muted);
            margin: 0;
        }

        /* 翻译展示区 */
        .translation-box {
            font-size: 18px;
            line-height: 1.6;
            margin-bottom: 30px;
            color: var(--text-main);
            text-align: center;
            min-height: 60px;
        }

        /* 填空展示区 */
        .blanks-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 5px;
            font-size: 24px;
            margin-bottom: 40px;
            line-height: 2;
        }

        .char-box {
            display: inline-block;
            min-width: 24px;
            text-align: center;
        }

        .char-blank {
            border-bottom: 2px solid var(--line-color);
            color: var(--accent-green);
            min-width: 24px;
            height: 30px;
            display: inline-block;
        }

        .punctuation {
            color: var(--text-main);
        }

        /* 输入框 */
        #user-input {
            width: 100%;
            padding: 15px;
            font-size: 18px;
            border: 1px solid var(--line-color);
            border-radius: 8px;
            background-color: transparent;
            text-align: center;
            outline: none;
            color: var(--text-main);
            font-family: inherit;
        }
        
        #user-input:focus {
            border-color: var(--accent-green);
        }
        
        #user-input:disabled {
            background-color: rgba(0,0,0,0.03);
            color: var(--text-muted);
            border-color: var(--line-color);
        }

        /* 底部导航按钮 (新增功能) */
        .nav-buttons {
            display: flex;
            justify-content: space-between;
            margin-top: 20px;
            width: 100%;
        }

        .nav-btn {
            background-color: transparent;
            color: var(--accent-green);
            border: 1px solid var(--accent-green);
            padding: 8px 20px;
            border-radius: 20px;
            font-size: 14px;
            cursor: pointer;
            font-family: inherit;
        }

        .nav-btn:disabled {
            color: var(--line-color);
            border-color: var(--line-color);
            cursor: not-allowed;
            background-color: transparent;
        }

        /* 总结界面 */
        #summary-screen {
            display: none;
            text-align: center;
        }

        .mistake-item {
            text-align: left;
            background: rgba(106, 139, 71, 0.1);
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 10px;
            font-size: 16px;
            line-height: 1.5;
        }

        .primary-btn {
            background-color: var(--accent-green);
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 16px;
            border-radius: 25px;
            margin-top: 20px;
            cursor: pointer;
            font-family: inherit;
        }
    </style>
</head>
<body>

<div id="app">
    <div class="header">
        <span id="mode-text">← 目录</span>
        <span id="progress-text">正在练习：第1句</span>
    </div>

    <!-- 练习界面 -->
    <div id="game-screen">
        <div class="title-area">
            <h1>兰亭集序</h1>
            <p>王羲之〔魏晋〕</p>
        </div>

        <div class="translation-box" id="translation"></div>

        <div class="blanks-container" id="blanks"></div>

        <input type="text" id="user-input" placeholder="请在此输入汉字" autocomplete="off">

        <!-- 新增的前后翻页导航 -->
        <div class="nav-buttons">
            <button id="btn-prev" class="nav-btn" onclick="goPrev()">上一句</button>
            <button id="btn-next" class="nav-btn" onclick="goNext()">下一句</button>
        </div>
    </div>

    <!-- 总结界面 -->
    <div id="summary-screen">
        <div class="title-area">
            <h1 id="summary-title">练习完成</h1>
            <p id="summary-subtitle">以下是本次练习中出错的句子</p>
        </div>
        <div id="mistakes-list"></div>
        <button class="primary-btn" onclick="startNextSession()">完成并返回</button>
    </div>
</div>

<script>
    const fullData = [
        { orig: "永和九年，岁在癸丑，", trans: "永和九年，时在癸丑之年，" },
        { orig: "暮春之初，", trans: "三月上旬，" },
        { orig: "会于会稽山阴之兰亭，", trans: "我们会集在会稽郡山阴县的兰亭，" },
        { orig: "修禊事也。", trans: "是为了做修禊的法事。" },
        { orig: "群贤毕至，少长咸集。", trans: "众多贤才都汇聚在这里，年长的年少的都聚集在一起。" },
        { orig: "此地有崇山峻岭，茂林修竹；", trans: "这里有高峻的山岭，茂密的树林和高高的竹子；" },
        { orig: "又有清流激湍，映带左右，", trans: "又有清澈湍急的水流，如同飘带一般环绕在亭子的四周，" },
        { orig: "引以为流觞曲水，列坐其次。", trans: "引（这些流水）作为浮动酒杯的弯曲水道，大家依次坐在水边。" }
    ];

    let currentData = []; 
    let currentIndex = 0;
    let highestIndex = 0; // 记录当前解锁到的最高题目索引
    let typedProgress = []; // 记录每道题用户已经打出的正确进度
    
    let currentSessionMistakes = new Set();
    let savedMistakes = JSON.parse(localStorage.getItem('lanting_mistakes')) || [];

    const transEl = document.getElementById('translation');
    const blanksEl = document.getElementById('blanks');
    const inputEl = document.getElementById('user-input');
    const progressEl = document.getElementById('progress-text');
    const modeEl = document.getElementById('mode-text');
    const btnPrev = document.getElementById('btn-prev');
    const btnNext = document.getElementById('btn-next');

    // 中文输入法状态标记
    let isComposing = false; 

    function getPureChars(str) {
        return str.replace(/[，。；？！、\s]/g, '');
    }

    function initGame() {
        document.getElementById('game-screen').style.display = 'block';
        document.getElementById('summary-screen').style.display = 'none';
        currentSessionMistakes.clear();
        currentIndex = 0;
        highestIndex = 0;

        if (savedMistakes.length > 0) {
            modeEl.innerText = "复习模式 (上次错题)";
            currentData = savedMistakes.map(index => ({...fullData[index], originalIndex: index}));
        } else {
            modeEl.innerText = "全文练习";
            currentData = fullData.map((item, index) => ({...item, originalIndex: index}));
        }

        // 初始化进度数组
        typedProgress = new Array(currentData.length).fill("");
        
        loadSentence();
    }

    function loadSentence() {
        const currentItem = currentData[currentIndex];
        transEl.innerText = currentItem.trans;
        progressEl.innerText = `当前进度：${currentIndex + 1} / ${currentData.length}`;
        
        // 核心逻辑：判断当前题目是“回看模式”还是“正在练习模式”
        if (currentIndex < highestIndex) {
            // 回看模式：已完成的题，锁定输入框，显示完整原文
            const origPure = getPureChars(currentItem.orig);
            inputEl.value = origPure;
            inputEl.disabled = true;
            inputEl.placeholder = "已完成";
            renderBlanks(origPure);
        } else {
            // 练习模式：未完成的题，开放输入框，恢复之前的正确进度
            inputEl.value = typedProgress[currentIndex];
            inputEl.disabled = false;
            inputEl.placeholder = "请在此输入汉字";
            renderBlanks(typedProgress[currentIndex]);
            setTimeout(() => inputEl.focus(), 100);
        }

        updateNavButtons();
    }

    function renderBlanks(typedPureChars) {
        const origText = currentData[currentIndex].orig;
        blanksEl.innerHTML = "";
        let charIndex = 0; 

        for (let i = 0; i < origText.length; i++) {
            const char = origText[i];
            const isPunctuation = /[，。；？！、\s]/.test(char);
            const span = document.createElement('span');
            
            if (isPunctuation) {
                span.className = "char-box punctuation";
                span.innerText = char;
            } else {
                span.className = "char-box char-blank";
                if (charIndex < typedPureChars.length) {
                    span.innerText = typedPureChars[charIndex];
                    span.style.borderBottom = "none"; 
                } else {
                    span.innerText = "";
                }
                charIndex++;
            }
            blanksEl.appendChild(span);
        }
    }

    // 导航按钮状态更新
    function updateNavButtons() {
        btnPrev.disabled = (currentIndex === 0);
        
        if (currentIndex < highestIndex) {
            btnNext.disabled = false;
            btnNext.innerText = (currentIndex === currentData.length - 1) ? "查看总结" : "下一句";
        } else {
            btnNext.disabled = true;
            btnNext.innerText = "下一句";
        }
    }

    function goPrev() {
        if (currentIndex > 0) {
            currentIndex--;
            loadSentence();
        }
    }

    function goNext() {
        if (currentIndex < currentData.length - 1) {
            currentIndex++;
            loadSentence();
        } else if (currentIndex === currentData.length - 1 && highestIndex === currentData.length) {
            showSummary();
        }
    }

    // ========== 输入法兼容与校验核心逻辑 ==========

    inputEl.addEventListener('compositionstart', () => {
        isComposing = true; // 用户开始打拼音
    });

    inputEl.addEventListener('compositionend', () => {
        isComposing = false; // 用户选中汉字，拼音组合结束
        handleInputValidation(); 
    });

    inputEl.addEventListener('input', () => {
        // 如果不在打拼音状态（比如直接复制粘贴、或者部分手机的默认输入行为），直接校验
        if (!isComposing) {
            handleInputValidation();
        }
    });

    function handleInputValidation() {
        if (currentIndex < highestIndex) return; // 回看模式不处理输入

        const origPureChars = getPureChars(currentData[currentIndex].orig);
        const rawVal = inputEl.value;
        
        // 校验：如果当前输入框里的文字，完全符合正确答案的前缀
        if (origPureChars.startsWith(rawVal)) {
            typedProgress[currentIndex] = rawVal;
            renderBlanks(rawVal);
            
            // 判断这句是否全部打完
            if (rawVal === origPureChars) {
                highestIndex = Math.max(highestIndex, currentIndex + 1);
                inputEl.blur(); // 暂时收起键盘
                
                setTimeout(() => {
                    goNext();
                }, 500); 
            }
        } else {
            // 输入不匹配（打错了汉字）
            currentSessionMistakes.add(currentData[currentIndex].originalIndex);
            
            // 撤回输入框内容，恢复到上一次正确的进度
            inputEl.value = typedProgress[currentIndex];
        }
    }

    // ========== 总结与复习逻辑 ==========

    function showSummary() {
        document.getElementById('game-screen').style.display = 'none';
        document.getElementById('summary-screen').style.display = 'block';
        
        const listEl = document.getElementById('mistakes-list');
        listEl.innerHTML = "";
        let mistakesArray = Array.from(currentSessionMistakes);

        if (mistakesArray.length > 0) {
            document.getElementById('summary-subtitle').innerText = "以下是本次需要加强记忆的句子：";
            mistakesArray.forEach(index => {
                const item = fullData[index];
                const div = document.createElement('div');
                div.className = "mistake-item";
                div.innerHTML = `<strong>原文：</strong>${item.orig}<br><span style="color:#666; font-size:14px;"><strong>译文：</strong>${item.trans}</span>`;
                listEl.appendChild(div);
            });
            localStorage.setItem('lanting_mistakes', JSON.stringify(mistakesArray));
        } else {
            document.getElementById('summary-subtitle').innerText = "太棒了！本次练习全对，没有错题。";
            localStorage.removeItem('lanting_mistakes');
        }
    }

    function startNextSession() {
        savedMistakes = JSON.parse(localStorage.getItem('lanting_mistakes')) || [];
        initGame();
    }

    window.onload = initGame;

</script>
</body>
</html>
