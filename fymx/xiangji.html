<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>《项脊轩志》翻译默写通关</title>
    <style>
        /* 颜色与字体设定 */
        :root {
            --bg-color: #F5F5EC;
            --text-main: #333333;
            --text-muted: #888888;
            --accent-green: #6A8B47;
            --line-color: #D3D3C8;
            --box-bg: #EAEAE0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: "STZhongsong", "SimSun", "Songti SC", serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        #app {
            width: 100%;
            max-width: 600px;
            padding: 20px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* ----- 首页选择界面 ----- */
        #start-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            flex: 1;
            margin-top: 40px;
            position: relative;
        }

        .back-to-main {
            position: absolute;
            top: -20px;
            left: 0;
            text-decoration: none;
            color: var(--text-muted);
            font-size: 16px;
            transition: color 0.3s ease;
        }
        
        .back-to-main:hover {
            color: var(--accent-green);
        }

        .main-title {
            font-size: 36px;
            font-weight: normal;
            margin-bottom: 10px;
            letter-spacing: 3px;
        }

        .sub-title {
            color: var(--text-muted);
            margin-bottom: 40px;
        }

        .mode-btn {
            background-color: transparent;
            color: var(--accent-green);
            border: 2px solid var(--accent-green);
            padding: 15px 30px;
            font-size: 18px;
            border-radius: 30px;
            margin: 15px 0;
            width: 80%;
            max-width: 300px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        .mode-btn:active {
            background-color: rgba(106, 139, 71, 0.1);
        }

        /* ----- 游戏界面 ----- */
        #game-screen {
            display: none; 
        }

        .header {
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            color: var(--text-muted);
            margin-bottom: 20px;
            margin-top: 10px;
        }

        .header-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            font-family: inherit;
            cursor: pointer;
            padding: 0;
            font-size: 14px;
        }

        .title-area {
            text-align: center;
            margin-bottom: 30px;
        }

        .title-area h1 {
            font-size: 28px;
            font-weight: normal;
            margin: 0 0 10px 0;
            letter-spacing: 2px;
        }

        .title-area p {
            font-size: 14px;
            color: var(--text-muted);
            margin: 0;
        }

        #level-badge {
            text-align: center;
            font-size: 16px;
            color: var(--accent-green);
            margin-bottom: 20px;
            font-weight: bold;
            letter-spacing: 1px;
        }

        .translation-box {
            font-size: 18px;
            line-height: 1.6;
            margin-bottom: 20px;
            color: var(--text-main);
            text-align: center;
            min-height: 50px;
        }

        .blanks-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            gap: 2px;
            font-size: 24px;
            margin-bottom: 30px;
            line-height: 2;
            background-color: var(--box-bg);
            border: 1px solid var(--line-color);
            border-radius: 8px;
            padding: 20px 10px;
            min-height: 40px;
            cursor: text; 
            box-shadow: inset 0 1px 3px rgba(0,0,0,0.05);
        }

        .char-box {
            display: inline-block;
            min-width: 24px;
            text-align: center;
            color: var(--text-muted); 
        }

        .char-blank {
            min-width: 24px;
            height: 30px;
            display: inline-block;
            border-bottom: 1px solid var(--text-muted); 
            margin: 0 2px;
        }

        .char-blank.active {
            border-bottom: 2px solid var(--accent-green);
            animation: blink 1s infinite;
        }

        @keyframes blink {
            0%, 100% { border-color: transparent; }
            50% { border-color: var(--accent-green); }
        }

        .punctuation {
            color: var(--text-muted);
            margin: 0 2px;
        }

        #user-input {
            position: absolute;
            left: -9999px;
            opacity: 0;
            width: 1px;
            height: 1px;
        }

        .nav-buttons {
            display: flex;
            justify-content: space-between;
            margin-top: 10px;
            width: 100%;
        }

        .nav-btn {
            background-color: transparent;
            color: var(--accent-green);
            border: 1px solid var(--accent-green);
            padding: 8px 20px;
            border-radius: 20px;
            font-size: 14px;
            cursor: pointer;
            font-family: inherit;
        }

        .nav-btn:disabled {
            color: var(--line-color);
            border-color: var(--line-color);
            cursor: not-allowed;
        }

        /* ----- 总结界面 ----- */
        #summary-screen {
            display: none;
            text-align: center;
            padding-bottom: 40px;
        }
        
        #evaluation-text {
            font-size: 18px;
            font-weight: bold;
            margin: 20px 0;
            padding: 15px;
            border-radius: 8px;
            background-color: #fff;
            border: 1px dashed var(--line-color);
        }

        .mistake-item {
            text-align: left;
            background: rgba(106, 139, 71, 0.1);
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 10px;
            font-size: 16px;
            line-height: 1.5;
        }

        .primary-btn {
            background-color: var(--accent-green);
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 16px;
            border-radius: 25px;
            margin-top: 20px;
            cursor: pointer;
            font-family: inherit;
        }
    </style>
</head>
<body>

<div id="app">
    <div id="start-screen">
        <a href="index.html" class="back-to-main">← 返回总目录</a>

        <h1 class="main-title">项脊轩志</h1>
        <p class="sub-title">默写通关挑战</p>
        
        <p style="font-size: 14px; color: #d9534f; margin-bottom: 20px; text-align: center; padding: 0 20px;">
            提示：建议使用<strong>手写键盘</strong>练习以增强记忆。
        </p>

        <button class="mode-btn" onclick="initGame(1)">顺序全文默写</button>
        <button class="mode-btn" onclick="initGame(2)">随机乱序挑战</button>
    </div>

    <div id="game-screen">
        <div class="header">
            <button class="header-btn" onclick="returnToStart()">← 返回模式选择</button>
            <span id="progress-text">进度：1/8</span>
        </div>

        <div class="title-area">
            <h1>项脊轩志</h1>
            <p>归有光〔明〕</p>
        </div>
        
        <div id="level-badge">当前模式：顺序全文默写</div>

        <div class="translation-box" id="translation"></div>

        <div class="blanks-container" id="blanks" onclick="focusInput()"></div>

        <input type="text" id="user-input" 
               autocomplete="off" 
               autocorrect="off" 
               autocapitalize="off" 
               spellcheck="false" 
               data-form-type="other">

        <div class="nav-buttons">
            <button id="btn-prev" class="nav-btn" onclick="goPrev()">上一句</button>
            <button id="btn-next" class="nav-btn" onclick="goNext()">下一句</button>
        </div>
    </div>

    <div id="summary-screen">
        <div class="title-area">
            <h1 id="summary-title">练习完成</h1>
            <p id="evaluation-text"></p>
            <p id="summary-subtitle">以下是本次错误超过3次的重点突破句子：</p>
        </div>
        <div id="mistakes-list"></div>
        <button class="primary-btn" onclick="returnToStart()">返回首页</button>
    </div>
</div>

<script>
    const fullData = [
    { orig: "项脊轩，旧南阁子也。", trans: "项脊轩，是原来的南阁子。" },
    { orig: "室仅方丈，可容一人居。", trans: "室内面积只有一丈见方，可以容纳一个人居住。" },
    { orig: "百年老屋，尘泥渗漉，雨泽下注；", trans: "这座百年老屋，泥土从上边漏下来，雨水也一直往下流；" },
    { orig: "每移案，顾视无可置者。", trans: "我每次动书桌，环视四周都没有可以安置桌案的地方。" },
    { orig: "又北向，不能得日，日过午已昏。", trans: "又屋子方位朝北，不能被阳光照到，一过了中午屋内就已昏暗。" },
    { orig: "余稍为修葺，使不上漏。", trans: "我稍稍修理了一下，使它不从上面漏土漏雨。" },
    { orig: "前辟四窗，垣墙周庭，以当南日，", trans: "向前开了四扇窗子，用矮墙在庭院周围环绕，用来对着南面射来的日光，" },
    { orig: "日影反照，室始洞然。", trans: "日光反射照耀，室内才明亮起来。" },
    { orig: "又杂植兰桂竹木于庭，旧时栏楯，亦遂增胜。", trans: "又在庭院里随意地种上兰花、桂树、竹子等草木，往日的栏杆，也增加了新的光彩。" },
    { orig: "借书满架，偃仰啸歌，冥然兀坐，万籁有声；", trans: "借来的书摆满了书架，我仰头高声吟诵诗歌，有时又静静地独自端坐，听自然界各种各样的声音；" },
    { orig: "而庭阶寂寂，小鸟时来啄食，人至不去。", trans: "庭院、台阶前静悄悄的，小鸟不时飞下来啄食，人走到它跟前也不离开。" },
    { orig: "三五之夜，明月半墙，桂影斑驳，风移影动，珊珊可爱。", trans: "农历十五的夜晚，明月高悬，照亮半截墙壁，桂树的影子交杂错落，微风吹过影子摇动，可爱极了。" },
    { orig: "然余居于此，多可喜，亦多可悲。", trans: "然而我住在这里，有许多值得高兴的事，也有许多悲伤的事。" },
    { orig: "先是庭中通南北为一。", trans: "在这以前，庭院南北相通成为一体。" },
    { orig: "迨诸父异爨，内外多置小门墙，往往而是。", trans: "等到伯父、叔父们分了家，室内外设置了许多小门，墙壁到处都是。" },
    { orig: "东犬西吠，客逾庖而宴，鸡栖于厅。", trans: "分家后，狗把原住同一庭院的人当作陌生人，客人得越过厨房去吃饭，鸡在厅堂里栖息。" },
    { orig: "庭中始为篱，已为墙，凡再变矣。", trans: "庭院中开始是篱笆隔开，然后又砌成了墙，一共变了两次。" },
    { orig: "家有老妪，尝居于此。", trans: "家中有个老婆婆，曾经在这里居住过。" },
    { orig: "妪，先大母婢也，乳二世，先妣抚之甚厚。", trans: "这个老婆婆，是我已经去世的祖母的婢女，给两代人喂过奶，先母对她很好。" },
    { orig: "室西连于中闺，先妣尝一至。", trans: "房子的西边和内室相连，去世的母亲曾经来过这里。" },
    { orig: "妪每谓余曰：“某所，而母立于兹。”", trans: "老婆婆常常对我说：“这个地方，你母亲曾经站在这里。”" },
    { orig: "妪又曰：“汝姊在吾怀，呱呱而泣；", trans: "老婆婆又说：“你姐姐在我怀中，呱呱地哭泣；" },
    { orig: "娘以指叩门扉曰：‘儿寒乎？欲食乎？’", trans: "你母亲用手指敲着房门说：‘孩子是冷呢，还是想吃东西呢？’" },
    { orig: "吾从板外相为应答。”", trans: "我隔着门一一回答。”" },
    { orig: "语未毕，余泣，妪亦泣。", trans: "话还没有说完，我就哭起来，老婆婆也流下了眼泪。" },
    { orig: "余自束发读书轩中，一日，大母过余曰：", trans: "我从十五岁起就在轩内读书，有一天，祖母来看我，说：" },
    { orig: "“吾儿，久不见若影，何竟日默默在此，大类女郎也？”", trans: "“我的孩子，好久没有见到你的身影了，为什么整天默默地呆在这里，像个女孩子一样呀？”" },
    { orig: "比去，以手阖门，自语曰：", trans: "等到离开时，用手关上门，自言自语地说：" },
    { orig: "“吾家读书久不效，儿之成，则可待乎！”", trans: "“我们家读书人很久没有得到功名了，孩子的成功，就指日可待了啊！”" },
    { orig: "顷之，持一象笏至，曰：", trans: "不一会，拿着一个象笏过来，说：" },
    { orig: "“此吾祖太常公宣德间执此以朝，他日汝当用之！”", trans: "“这是我的祖父太常公宣德年间拿着去朝见皇帝用的，以后你一定会用到它！”" },
    { orig: "瞻顾遗迹，如在昨日，令人长号不自禁。", trans: "瞻仰回顾旧日事物，就像发生在昨天一样，让人忍不住放声大哭。" },
    { orig: "轩东故尝为厨，人往，从轩前过。", trans: "项脊轩的东边曾经是厨房，人们到那里去，必须从轩前经过。" },
    { orig: "余扃牖而居，久之，能以足音辨人。", trans: "我关着窗子住在里面，时间长了，能够根据脚步声辨别是谁。" },
    { orig: "轩凡四遭火，得不焚，殆有神护者。", trans: "项脊轩一共遭过四次火灾，能够不被焚毁，大概是有神灵在保护着吧。" },
    { orig: "余既为此志，后五年，吾妻来归，", trans: "我作了这篇文章之后，过了五年，我的妻子嫁到我家来，" },
    { orig: "时至轩中，从余问古事，或凭几学书。", trans: "她时常来到轩中，向我问一些旧时的事情，有时伏在桌旁学写字。" },
    { orig: "吾妻归宁，述诸小妹语曰：", trans: "我妻子回娘家探亲，回来转述她的小妹妹们的话说：" },
    { orig: "“闻姊家有阁子，且何谓阁子也？”", trans: "“听说姐姐家有个小阁楼，那么，什么叫小阁楼呢？”" },
    { orig: "其后六年，吾妻死，室坏不修。", trans: "这以后六年，我的妻子去世，项脊轩破败没有整修。" },
    { orig: "其后二年，余久卧病无聊，乃使人复葺南阁子，其制稍异于前。", trans: "又过了两年，我很长时间生病卧床没有什么精神寄托，就派人再次修缮南阁子，格局跟过去稍有不同。" },
    { orig: "然自后余多在外，不常居。", trans: "然而这之后我多在外边，不常住在这里。" },
    { orig: "庭有枇杷树，吾妻死之年所手植也，", trans: "庭院中有一株枇杷树，是我妻子去世那年她亲手种的，" },
    { orig: "今已亭亭如盖矣。", trans: "如今已经高高挺立着，枝叶繁茂像伞一样了。" }
    ];

    let currentData = []; 
    let currentIndex = 0;
    let highestIndex = 0; 
    let typedProgress = []; 
    let currentLevel = 1; 

    let mistakeCounter = {}; 
    let currentSessionMistakes = new Set(); 
    let autoInputCount = 0; 

    const transEl = document.getElementById('translation');
    const blanksEl = document.getElementById('blanks');
    const inputEl = document.getElementById('user-input');
    const progressEl = document.getElementById('progress-text');
    const levelBadgeEl = document.getElementById('level-badge');
    const btnPrev = document.getElementById('btn-prev');
    const btnNext = document.getElementById('btn-next');
    const evalEl = document.getElementById('evaluation-text');

    let isComposing = false; 

    function getPureChars(str) {
        return str.replace(/[，。；？！、\s]/g, '');
    }

    function shuffleArray(array) {
        let newArr = [...array];
        for (let i = newArr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [newArr[i], newArr[j]] = [newArr[j], newArr[i]];
        }
        return newArr;
    }

    function focusInput() {
        if (currentIndex >= highestIndex) {
            inputEl.focus();
        }
    }

    function returnToStart() {
        document.getElementById('start-screen').style.display = 'flex';
        document.getElementById('game-screen').style.display = 'none';
        document.getElementById('summary-screen').style.display = 'none';
        
        mistakeCounter = {};
        currentSessionMistakes.clear();
        autoInputCount = 0;
    }

    function initGame(level) {
        document.getElementById('start-screen').style.display = 'none';
        document.getElementById('summary-screen').style.display = 'none';
        document.getElementById('game-screen').style.display = 'block';
        
        currentLevel = level;
        currentIndex = 0;
        highestIndex = 0;
        autoInputCount = 0;
        mistakeCounter = {};
        currentSessionMistakes.clear();
        typedProgress = new Array(fullData.length).fill("");

        let baseData = fullData.map((item, index) => ({...item, originalIndex: index}));

        if (currentLevel === 1) {
            levelBadgeEl.innerText = "当前模式：顺序全文默写";
            currentData = baseData;
        } else if (currentLevel === 2) {
            levelBadgeEl.innerText = "当前模式：随机乱序挑战";
            currentData = shuffleArray(baseData);
        }

        loadSentence();
    }

    function loadSentence() {
        const currentItem = currentData[currentIndex];
        transEl.innerText = currentItem.trans;
        progressEl.innerText = `进度：${currentIndex + 1}/${currentData.length}`;
        
        if (currentIndex < highestIndex) {
            const origPure = getPureChars(currentItem.orig);
            inputEl.value = origPure;
            renderBlanks(origPure, true); 
        } else {
            inputEl.value = typedProgress[currentIndex];
            renderBlanks(typedProgress[currentIndex], false);
            setTimeout(() => focusInput(), 100);
        }

        updateNavButtons();
    }

    function renderBlanks(typedPureChars, isCompleted) {
        const origText = currentData[currentIndex].orig;
        blanksEl.innerHTML = "";
        let charIndex = 0; 

        for (let i = 0; i < origText.length; i++) {
            const char = origText[i];
            const isPunctuation = /[，。；？！、\s]/.test(char);
            const span = document.createElement('span');
            
            if (isPunctuation) {
                span.className = "char-box punctuation";
                span.innerText = char;
            } else {
                span.className = "char-box char-blank";
                
                if (charIndex < typedPureChars.length) {
                    span.innerText = typedPureChars[charIndex];
                    span.style.borderBottom = "none";
                    span.style.color = "#8A8A80"; 
                } else {
                    span.innerText = "";
                    if (!isCompleted && charIndex === typedPureChars.length) {
                        span.classList.add('active');
                    }
                }
                charIndex++;
            }
            blanksEl.appendChild(span);
        }
    }

    function updateNavButtons() {
        btnPrev.disabled = (currentIndex === 0);
        if (currentIndex < highestIndex) {
            btnNext.disabled = false;
            if (currentIndex === currentData.length - 1) {
                btnNext.innerText = "查看总结"; 
            } else {
                btnNext.innerText = "下一句";
            }
        } else {
            btnNext.disabled = true;
            btnNext.innerText = "下一句";
        }
    }

    function goPrev() {
        if (currentIndex > 0) {
            currentIndex--;
            loadSentence();
        }
    }

    function goNext() {
        if (currentIndex < currentData.length - 1) {
            currentIndex++;
            loadSentence();
        } else if (currentIndex === currentData.length - 1 && highestIndex === currentData.length) {
            showSummary(); 
        }
    }

    // 输入法逻辑（兼容拼音及手写）
    inputEl.addEventListener('compositionstart', () => { isComposing = true; });
    inputEl.addEventListener('compositionend', () => { 
        isComposing = false; 
        handleInputValidation(); 
    });
    inputEl.addEventListener('input', () => { 
        if (!isComposing) handleInputValidation(); 
    });

        function handleInputValidation() {
        if (currentIndex < highestIndex) return; 

        const origIndex = currentData[currentIndex].originalIndex;
        const origPureChars = getPureChars(currentData[currentIndex].orig);
        const rawVal = inputEl.value;
        const currentProgress = typedProgress[currentIndex];
        
        let isValid = false;
        let newProgress = currentProgress;

        // 核心修复：兼容手写与拼音的双重判断逻辑
        
        // 情况1：拼音键盘（正常拼接了之前的内容，比如传进来的是 "永和"）
        if (origPureChars.startsWith(rawVal)) {
            // 只要不是按了删除键，就判定为正确
            if (rawVal.length >= currentProgress.length) {
                isValid = true;
                newProgress = rawVal;
            } else {
                inputEl.value = currentProgress; // 忽略删除操作
                return;
            }
        } 
        // 情况2：手写键盘（丢失了前面的字，只传进来了新写的字，比如传进来的只有 "和"）
        else {
            const expectedRemainder = origPureChars.substring(currentProgress.length);
            // 检查：新写进来的字，是不是紧接着该出现的字？
            if (rawVal.length > 0 && expectedRemainder.startsWith(rawVal)) {
                isValid = true;
                newProgress = currentProgress + rawVal; // 手动把前面的进度拼接起来
            }
            // 情况3：极致兼容（只要键盘传进来的最后一个字是正确的，就算对）
            else if (rawVal.length > 0 && rawVal.charAt(rawVal.length - 1) === origPureChars.charAt(currentProgress.length)) {
                isValid = true;
                newProgress = currentProgress + rawVal.charAt(rawVal.length - 1);
            }
        }

        if (isValid) {
            // 检测是否自动填入了3个字及以上（针对联想作弊检测）
            const newLen = newProgress.length;
            const previousLen = currentProgress.length;
            if (newLen > previousLen && (newLen - previousLen) >= 3) {
                autoInputCount++;
            }

            // 更新输入进度
            typedProgress[currentIndex] = newProgress;
            inputEl.value = newProgress; // 强制同步给底层输入框，防止手写键盘错乱
            renderBlanks(newProgress, false);
            
            // 判断这句是否全部打完
            if (newProgress === origPureChars) {
                highestIndex = Math.max(highestIndex, currentIndex + 1);
                
                // 如果是最后一句，收起键盘
                if (currentIndex === currentData.length - 1) {
                    inputEl.blur(); 
                }
                
                renderBlanks(newProgress, true); 
                
                setTimeout(() => {
                    goNext();
                }, 400); 
            }
        } else {
            // 错误处理（错 3 次判定为错题）
            mistakeCounter[origIndex] = (mistakeCounter[origIndex] || 0) + 1;
            if (mistakeCounter[origIndex] >= 3) {
                currentSessionMistakes.add(origIndex);
            }
            
            // 强制撤回，恢复到正确进度
            inputEl.value = currentProgress;
        }
    }

    function showSummary() {
        document.getElementById('game-screen').style.display = 'none';
        document.getElementById('summary-screen').style.display = 'block';
        
        if (autoInputCount > 15) {
            evalEl.innerText = `千里之堤，溃于蚁穴。你用了 ${autoInputCount} 次自动输入。`;
            evalEl.style.color = "#d9534f"; 
        } else {
            evalEl.innerText = "千里之行，始于足下。一次次键盘的敲击，是你的努力可见。";
            evalEl.style.color = "var(--accent-green)"; 
        }

        const listEl = document.getElementById('mistakes-list');
        listEl.innerHTML = "";
        let mistakesArray = Array.from(currentSessionMistakes);

        if (mistakesArray.length > 0) {
            document.getElementById('summary-subtitle').innerText = "以下是本次练习中错误超过3次的句子：";
            mistakesArray.forEach(index => {
                const item = fullData[index];
                const div = document.createElement('div');
                div.className = "mistake-item";
                div.innerHTML = `<strong>原文：</strong>${item.orig}<br><span style="color:#666; font-size:14px;"><strong>译文：</strong>${item.trans}</span>`;
                listEl.appendChild(div);
            });
        } else {
            document.getElementById('summary-subtitle').innerText = "非常完美！全部通关且没有严重错误。";
        }
    }

    document.addEventListener('click', (e) => {
        const gameScreen = document.getElementById('game-screen');
        if (gameScreen.style.display !== 'none' && currentIndex < highestIndex) {
            if (e.target.tagName !== 'BUTTON') {
                focusInput();
            }
        }
    });

    window.onload = returnToStart;
</script>
