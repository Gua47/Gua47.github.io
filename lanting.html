<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>背诵闯关：兰亭集序</title>
    <style>
        :root { --bg-color: #f4f1e6; --text-color: #333; --primary-color: #6b8e23; --border-color: #c9c4b4; }
        body { background-color: var(--bg-color); color: var(--text-color); font-family: "PingFang SC", "STSong", serif; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        
        .nav-header { width: 100%; max-width: 500px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .back-link { text-decoration: none; color: #666; font-size: 14px; }

        /* 进度条样式 */
        .progress-container { width: 100%; max-width: 500px; margin-bottom: 30px; position: relative; }
        .progress-line { height: 2px; background: var(--border-color); position: absolute; top: 15px; width: 100%; z-index: 1; }
        .progress-active { height: 2px; background: var(--primary-color); position: absolute; top: 15px; z-index: 2; transition: width 0.3s; }
        .nodes { display: flex; justify-content: space-between; position: relative; z-index: 3; }
        .node { width: 30px; height: 30px; background: var(--bg-color); border: 2px solid var(--border-color); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; color: #999; }
        .node.active { border-color: var(--primary-color); color: var(--primary-color); font-weight: bold; background: #fff; }

        /* 正文区：增加底部内边距 */
        #game-area { width: 100%; max-width: 500px; line-height: 3; font-size: 1.3rem; text-align: justify; padding-bottom: 200px; }
        h2 { text-align: center; margin-bottom: 5px; letter-spacing: 2px; }
        .author { text-align: center; color: #666; font-size: 0.9rem; margin-bottom: 25px; }

        /* 挖空样式 */
        .blank { 
            display: inline-flex; 
            align-items: center; 
            justify-content: center;
            width: 1.6rem; 
            height: 1.6rem; 
            border-bottom: 2px solid #999; 
            margin: 0 4px; 
            vertical-align: middle; 
            cursor: pointer;
            transition: all 0.2s;
        }
        .blank.active { 
            border-bottom-color: var(--primary-color); 
            background-color: rgba(107, 142, 35, 0.1);
            animation: breathe 1.2s infinite;
        }
        @keyframes breathe { 0% { opacity: 0.5; } 50% { opacity: 1; } 100% { opacity: 0.5; } }
        .blank.filled { border-bottom: none; color: var(--primary-color); font-weight: bold; width: auto; min-width: 1.2rem; }
        .blank.wrong { background: #f2dede; border-bottom-color: #d9534f; }

        /* 选项区：固定高度，仅显示5个 */
        #options-container { position: fixed; bottom: 0; left: 0; width: 100%; background: #fff; padding: 25px 0; border-top: 1px solid var(--border-color); display: flex; justify-content: center; gap: 15px; z-index: 100; box-shadow: 0 -5px 15px rgba(0,0,0,0.05); }
        .option-btn { width: 55px; height: 55px; border: 1px solid var(--border-color); display: flex; align-items: center; justify-content: center; font-size: 1.4rem; background: #fff; border-radius: 8px; cursor: pointer; transition: background 0.2s; }
        .option-btn:active { background-color: #f0f0f0; transform: scale(0.95); }

        /* 默写模式 */
        #input-mode { display: none; width: 100%; max-width: 500px; }
        #text-input { width: 100%; height: 220px; padding: 15px; font-size: 1.1rem; border: 1px solid var(--border-color); border-radius: 8px; line-height: 1.8; box-sizing: border-box; }
        .submit-btn { width: 100%; margin-top: 15px; padding: 15px; background: var(--primary-color); color: white; border: none; border-radius: 6px; font-size: 1.1rem; }
    </style>
</head>
<body>
    <div class="nav-header">
        <a href="index.html" class="back-link">← 目录</a>
        <span id="level-title" style="font-size: 14px; color: #888;">正在练习：第一关</span>
    </div>

    <div class="progress-container">
        <div class="progress-line"></div>
        <div id="progress-active" class="progress-active"></div>
        <div class="nodes">
            <div class="node active">1</div>
            <div class="node">2</div>
            <div class="node">3</div>
            <div class="node">4</div>
            <div class="node">测</div>
        </div>
    </div>

    <div id="game-area">
        <h2>兰亭集序</h2>
        <div class="author">王羲之 〔魏晋〕</div>
        <div id="content-body"></div>
    </div>

    <div id="options-container"></div>
    <div id="input-mode">
        <textarea id="text-input" placeholder="请凭记忆默写原文内容..."></textarea>
        <button class="submit-btn" onclick="checkFinal()">提交校验</button>
    </div>

    <script>
        const fullText = "永和九年，岁在癸丑，暮春之初，会于会稽山阴之兰亭，修禊事也。群贤毕至，少长咸集。此地有崇山峻岭，茂林修竹；又有清流激湍，映带左右，引以为流觞曲水，列坐其次。虽无丝竹管弦之盛，一觞一咏，亦足以畅叙幽情。";
        // 提取原文所有汉字作为干扰项池
        const charPool = [...new Set(fullText.replace(/[，。；？、〔〕\s]/g, "").split(''))];
        
        let currentLevel = 1;
        let allBlanks = [];
        let activeIndex = 0;

        function initLevel(level) {
            const body = document.getElementById('content-body');
            const opts = document.getElementById('options-container');
            const inp = document.getElementById('input-mode');
            body.innerHTML = '';
            opts.innerHTML = '';
            allBlanks = [];
            activeIndex = 0;
            
            document.getElementById('level-title').innerText = level === 5 ? "终极测评" : `正在练习：第${level}关`;
            document.querySelectorAll('.node').forEach((n, i) => n.classList.toggle('active', i < level));
            document.getElementById('progress-active').style.width = (level - 1) * 25 + '%';

            if (level === 5) {
                body.innerHTML = "<p style='text-align:center; color:#999;'>终极默写挑战</p>";
                opts.style.display = 'none';
                inp.style.display = 'block';
                return;
            }

            opts.style.display = 'flex';
            inp.style.display = 'none';

            const chars = fullText.split('');
            const gapRates = [0.15, 0.35, 0.6, 0.85];
            const rate = gapRates[level-1];

            chars.forEach(char => {
                if (/[，。；？、〔〕]/.test(char)) {
                    body.appendChild(document.createTextNode(char));
                } else {
                    if (Math.random() < rate) {
                        const span = document.createElement('span');
                        span.className = 'blank';
                        span.dataset.ans = char;
                        body.appendChild(span);
                        allBlanks.push(span);
                    } else {
                        body.appendChild(document.createTextNode(char));
                    }
                }
            });

            if (allBlanks.length === 0) { initLevel(level); return; }
            
            refreshUI();
        }

        // 刷新当前激活的空位和下方的选项
        function refreshUI() {
            if (activeIndex >= allBlanks.length) {
                setTimeout(() => {
                    alert("关卡圆满完成！");
                    currentLevel++;
                    initLevel(currentLevel);
                }, 400);
                return;
            }

            // 1. 更新空位状态
            allBlanks.forEach((b, i) => {
                b.classList.remove('active');
                if (i === activeIndex) {
                    b.classList.add('active');
                    b.scrollIntoView({ behavior: 'smooth', block: 'center' });
                }
            });

            // 2. 生成5个选项（1正+4误）
            const correctChar = allBlanks[activeIndex].dataset.ans;
            const options = [correctChar];
            
            // 从字池里挑4个不同的字作为干扰
            const others = charPool.filter(c => c !== correctChar);
            const distractors = others.sort(() => Math.random() - 0.5).slice(0, 4);
            options.push(...distractors);
            
            // 乱序排列选项
            options.sort(() => Math.random() - 0.5);

            const optsContainer = document.getElementById('options-container');
            optsContainer.innerHTML = '';
            options.forEach(char => {
                const btn = document.createElement('div');
                btn.className = 'option-btn';
                btn.innerText = char;
                btn.onclick = () => {
                    if (char === correctChar) {
                        allBlanks[activeIndex].innerText = char;
                        allBlanks[activeIndex].className = 'blank filled';
                        activeIndex++;
                        refreshUI(); // 填对后立刻刷新
                    } else {
                        allBlanks[activeIndex].classList.add('wrong');
                        setTimeout(() => allBlanks[activeIndex].classList.remove('wrong'), 400);
                    }
                };
                optsContainer.appendChild(btn);
            });
        }

        function checkFinal() {
            const val = document.getElementById('text-input').value.replace(/\s+/g, "");
            const target = fullText.replace(/\s+/g, "");
            if (val === target) alert("完美通过！");
            else alert("还需检查标点或文字准确度。");
        }

        initLevel(1);
    </script>
</body>
</html>
