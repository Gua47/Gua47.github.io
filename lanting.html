<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>背诵闯关：兰亭集序</title>
    <style>
        :root { --bg-color: #f4f1e6; --text-color: #333; --primary-color: #6b8e23; --border-color: #c9c4b4; }
        body { background-color: var(--bg-color); color: var(--text-color); font-family: "PingFang SC", "STSong", serif; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        
        .nav-header { width: 100%; max-width: 500px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .back-link { text-decoration: none; color: #666; font-size: 14px; }

        .progress-container { width: 100%; max-width: 500px; margin-bottom: 30px; position: relative; }
        .progress-line { height: 2px; background: var(--border-color); position: absolute; top: 15px; width: 100%; z-index: 1; }
        .progress-active { height: 2px; background: var(--primary-color); position: absolute; top: 15px; z-index: 2; transition: width 0.3s; }
        .nodes { display: flex; justify-content: space-between; position: relative; z-index: 3; }
        .node { width: 30px; height: 30px; background: var(--bg-color); border: 2px solid var(--border-color); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; color: #999; }
        .node.active { border-color: var(--primary-color); color: var(--primary-color); font-weight: bold; background: #fff; }

        /* 正文区：增加底部内边距防止遮挡 */
        #game-area { width: 100%; max-width: 500px; line-height: 2.8; font-size: 1.25rem; text-align: justify; padding-bottom: 250px; }
        h2 { text-align: center; margin-bottom: 5px; letter-spacing: 2px; }
        .author { text-align: center; color: #666; font-size: 0.9rem; margin-bottom: 25px; }

        /* 挖空样式 */
        .blank { 
            display: inline-flex; 
            align-items: center; 
            justify-content: center;
            width: 1.6rem; 
            height: 1.6rem; 
            border-bottom: 2px solid #999; 
            margin: 0 4px; 
            vertical-align: middle; 
            cursor: pointer;
            transition: all 0.2s;
        }
        /* 当前正在填写的空位：呼吸灯特效 */
        .blank.active { 
            border-bottom-color: var(--primary-color); 
            background-color: rgba(107, 142, 35, 0.15);
            animation: breathe 1.5s infinite ease-in-out;
        }
        @keyframes breathe {
            0% { opacity: 0.6; }
            50% { opacity: 1; }
            100% { opacity: 0.6; }
        }
        .blank.filled { border-bottom: none; color: var(--primary-color); font-weight: bold; width: auto; min-width: 1.2rem; }
        .blank.wrong { background: #f2dede; border-bottom-color: #d9534f; animation: shake 0.3s; }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-4px); }
            75% { transform: translateX(4px); }
        }

        /* 选项区 */
        #options-container { position: fixed; bottom: 0; left: 0; width: 100%; background: rgba(253, 252, 248, 0.95); padding: 15px 0; border-top: 1px solid var(--border-color); display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; z-index: 100; box-shadow: 0 -5px 15px rgba(0,0,0,0.08); max-height: 40vh; overflow-y: auto; }
        .option-btn { width: 42px; height: 42px; border: 1px solid var(--border-color); display: flex; align-items: center; justify-content: center; font-size: 1.2rem; background: #fff; border-radius: 4px; cursor: pointer; user-select: none; }
        /* 选对后消失的动画 */
        .option-btn.fade-out { opacity: 0; transform: scale(0.5); pointer-events: none; transition: all 0.3s; }

        #input-mode { display: none; width: 100%; max-width: 500px; }
        #text-input { width: 100%; height: 220px; padding: 15px; font-size: 1.1rem; border: 1px solid var(--border-color); border-radius: 8px; line-height: 1.8; box-sizing: border-box; }
        .submit-btn { width: 100%; margin-top: 15px; padding: 12px; background: var(--primary-color); color: white; border: none; border-radius: 6px; font-size: 1rem; }
    </style>
</head>
<body>
    <div class="nav-header">
        <a href="index.html" class="back-link">← 目录</a>
        <span id="level-title" style="font-size: 14px; color: #888;">正在练习：第一关</span>
    </div>

    <div class="progress-container">
        <div class="progress-line"></div>
        <div id="progress-active" class="progress-active"></div>
        <div class="nodes">
            <div class="node active">1</div>
            <div class="node">2</div>
            <div class="node">3</div>
            <div class="node">4</div>
            <div class="node">测</div>
        </div>
    </div>

    <div id="game-area">
        <h2>兰亭集序</h2>
        <div class="author">王羲之 〔魏晋〕</div>
        <div id="content-body"></div>
    </div>

    <div id="options-container"></div>
    <div id="input-mode">
        <textarea id="text-input" placeholder="请凭记忆默写第一段全文..."></textarea>
        <button class="submit-btn" onclick="checkFinal()">提交校验</button>
    </div>

    <script>
        const fullText = "永和九年，岁在癸丑，暮春之初，会于会稽山阴之兰亭，修禊事也。群贤毕至，少长咸集。此地有崇山峻岭，茂林修竹；又有清流激湍，映带左右，引以为流觞曲水，列坐其次。虽无丝竹管弦之盛，一觞一咏，亦足以畅叙幽情。";
        let currentLevel = 1;
        let allBlanks = [];
        let activeBlankIndex = 0;

        function initLevel(level) {
            const body = document.getElementById('content-body');
            const opts = document.getElementById('options-container');
            const inp = document.getElementById('input-mode');
            body.innerHTML = '';
            opts.innerHTML = '';
            allBlanks = [];
            activeBlankIndex = 0;
            
            document.getElementById('level-title').innerText = level === 5 ? "终极测评" : `正在练习：第${level}关`;
            document.querySelectorAll('.node').forEach((n, i) => n.classList.toggle('active', i < level));
            document.getElementById('progress-active').style.width = (level - 1) * 25 + '%';

            if (level === 5) {
                body.innerHTML = "<p style='text-align:center; color:#999;'>请在下方框内默写全文</p>";
                opts.style.display = 'none';
                inp.style.display = 'block';
                return;
            }

            opts.style.display = 'flex';
            inp.style.display = 'none';

            const chars = fullText.split('');
            const gapRates = [0.15, 0.35, 0.6, 0.85];
            const rate = gapRates[level-1];

            // 生成文本和空位
            chars.forEach(char => {
                if (/[，。；？、〔〕]/.test(char)) {
                    body.appendChild(document.createTextNode(char));
                } else {
                    if (Math.random() < rate) {
                        const span = document.createElement('span');
                        span.className = 'blank';
                        span.dataset.ans = char;
                        body.appendChild(span);
                        allBlanks.push(span);
                    } else {
                        body.appendChild(document.createTextNode(char));
                    }
                }
            });

            if (allBlanks.length === 0) { initLevel(level); return; }

            // 初始聚焦第一个空
            updateActiveBlank();

            // 生成选项（仅显示答案，选对消失）
            const answers = allBlanks.map(b => b.dataset.ans);
            const shuffleAnswers = answers.sort(() => Math.random() - 0.5);
            
            shuffleAnswers.forEach((char, index) => {
                const btn = document.createElement('div');
                btn.className = 'option-btn';
                btn.innerText = char;
                btn.onclick = () => handleOptionClick(char, btn);
                opts.appendChild(btn);
            });
        }

        function updateActiveBlank() {
            allBlanks.forEach(b => b.classList.remove('active'));
            if (activeBlankIndex < allBlanks.length) {
                const current = allBlanks[activeBlankIndex];
                current.classList.add('active');
                // 自动滚动，确保当前空位在视野内
                current.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }
        }

        function handleOptionClick(char, btn) {
            if (activeBlankIndex >= allBlanks.length) return;

            const targetBlank = allBlanks[activeBlankIndex];
            if (char === targetBlank.dataset.ans) {
                // 选对了
                targetBlank.innerText = char;
                targetBlank.className = 'blank filled';
                btn.classList.add('fade-out'); // 按钮消失
                setTimeout(() => btn.remove(), 300);

                activeBlankIndex++;
                if (activeBlankIndex < allBlanks.length) {
                    updateActiveBlank(); // 自动跳转下一个
                } else {
                    setTimeout(() => {
                        alert("本关圆满完成！即将进入下一难度。");
                        currentLevel++;
                        initLevel(currentLevel);
                    }, 500);
                }
            } else {
                // 选错了
                targetBlank.classList.add('wrong');
                setTimeout(() => targetBlank.classList.remove('wrong'), 400);
            }
        }

        function checkFinal() {
            const val = document.getElementById('text-input').value.replace(/\s+/g, "");
            const target = fullText.replace(/\s+/g, "");
            if (val === target) alert("完璧归赵！全文背诵成功！");
            else alert("内容似乎还有点不准确，请再检查一下。");
        }

        initLevel(1);
    </script>
</body>
</html>
