<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>背诵闯关：兰亭集序专业版</title>
    <style>
        :root { --bg-color: #f4f1e6; --text-color: #333; --primary-color: #6b8e23; --error-color: #d9534f; --border-color: #c9c4b4; }
        body { background-color: var(--bg-color); color: var(--text-color); font-family: "PingFang SC", "STSong", serif; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        
        /* 进度条 */
        .progress-container { width: 100%; max-width: 600px; margin-bottom: 20px; position: relative; }
        .progress-line { height: 2px; background: var(--border-color); position: absolute; top: 15px; width: 100%; z-index: 1; }
        .progress-active { height: 2px; background: var(--primary-color); position: absolute; top: 15px; z-index: 2; transition: width 0.3s; }
        .nodes { display: flex; justify-content: space-between; position: relative; z-index: 3; }
        .node { width: 30px; height: 30px; background: var(--bg-color); border: 2px solid var(--border-color); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; color: #999; }
        .node.active { border-color: var(--primary-color); color: var(--primary-color); font-weight: bold; background: #fff; }

        /* 内容区 */
        #game-area { width: 100%; max-width: 600px; padding-bottom: 220px; }
        #content-body p { line-height: 2.5; font-size: 1.25rem; text-indent: 2em; margin: 15px 0; }
        .blank { display: inline-flex; align-items: center; justify-content: center; width: 1.6rem; height: 1.6rem; border-bottom: 2px solid #999; margin: 0 2px; vertical-align: middle; }
        .blank.active { border-bottom-color: var(--primary-color); background: rgba(107, 142, 35, 0.1); animation: breathe 1.2s infinite; }
        .blank.filled { border-bottom: none; color: var(--primary-color); font-weight: bold; }
        
        /* 错误比对高亮 */
        .char-correct { color: #666; }
        .char-error { color: var(--error-color); font-weight: bold; text-decoration: underline; background: #ffebeb; }
        .char-missing { color: #aaa; text-decoration: line-through; }

        /* 选项与输入 */
        #options-container { position: fixed; bottom: 0; left: 0; width: 100%; background: #fff; padding: 15px 0; border-top: 1px solid var(--border-color); display: flex; justify-content: center; gap: 10px; z-index: 100; flex-wrap: wrap; box-shadow: 0 -5px 15px rgba(0,0,0,0.05); }
        .option-btn { width: 45px; height: 45px; border: 1px solid var(--border-color); display: flex; align-items: center; justify-content: center; font-size: 1.3rem; background: #fff; border-radius: 6px; }

        #input-mode { display: none; width: 100%; max-width: 600px; }
        #text-input { width: 100%; height: 250px; padding: 15px; font-size: 1.1rem; border: 1px solid var(--border-color); border-radius: 8px; line-height: 1.8; box-sizing: border-box; }
        #diff-result { display: none; background: white; padding: 20px; border-radius: 8px; border: 1px solid #ddd; margin-top: 10px; line-height: 2; }

        /* 覆盖层 */
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(244, 241, 230, 0.98); z-index: 200; flex-direction: column; align-items: center; justify-content: center; padding: 20px; box-sizing: border-box; }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 100%; max-width: 450px; text-align: center; }
        .btn-main { width: 100%; padding: 15px; background: var(--primary-color); color: #fff; border: none; border-radius: 8px; font-size: 1.1rem; margin-top: 10px; cursor: pointer; }

        @keyframes breathe { 0%, 100% { opacity: 0.5; } 50% { opacity: 1; } }
    </style>
</head>
<body>

    <div id="choice-overlay" class="overlay">
        <div class="card">
            <h2>完成阶段挑战！🎉</h2>
            <p>请选择接下来的挑战方式：</p>
            <button class="btn-main" onclick="startLevel(5)">方式A：语音默写/分段背诵</button>
            <button class="btn-main" style="background:#5a7d9a" onclick="startLevel(6)">方式B：全文终极挑战</button>
        </div>
    </div>

    <div id="info-overlay" class="overlay">
        <div class="card">
            <h2>全篇通关！</h2>
            <input type="text" id="u-class" placeholder="班级" style="width:100%; padding:10px; margin:5px 0;">
            <input type="text" id="u-name" placeholder="姓名" style="width:100%; padding:10px; margin:5px 0;">
            <button class="btn-main" onclick="showCert()">生成专属成就卡</button>
        </div>
    </div>

    <div id="cert-overlay" class="overlay" style="background: #e9e5d8;">
        <div id="certificate" class="card" style="border: 6px double var(--primary-color);">
            <h2 style="color:var(--primary-color)">背诵成就档案</h2>
            <p style="text-align:left;"><b><span id="c-info"></span></b> 同学：</p>
            <p style="text-align:left; text-indent:2em; font-size:0.9rem;">你在《兰亭集序》挑战中表现优异。系统已自动记录本次学习数据以供教学分析。</p>
            <div id="error-stats-display" style="text-align:left; font-size:0.85rem; background:#f9f9f9; padding:10px; border-radius:5px; margin:10px 0;">
                <b>🔍 易错字词记录：</b><br><span id="error-list">无</span>
            </div>
            <p style="text-align:right; font-size:0.8rem; color:#999;">认证时间：<span id="c-date"></span></p>
            <div style="font-weight:bold; color:var(--error-color); margin-top:10px;">请截图发给老师核验</div>
        </div>
        <button class="btn-main" style="max-width:450px; background:#666;" onclick="location.reload()">回目录</button>
    </div>

    <div class="nav-header">
        <span id="level-title" style="font-weight:bold; color:var(--primary-color);">准备开始</span>
    </div>

    <div class="progress-container">
        <div class="progress-line"></div>
        <div id="progress-active" class="progress-active"></div>
        <div class="nodes" id="node-list">
            <div class="node">1</div><div class="node">2</div><div class="node">3</div>
            <div class="node">4</div><div class="node">5</div><div class="node">6</div>
        </div>
    </div>

    <div id="game-area">
        <h2 id="main-title">兰亭集序</h2>
        <div id="content-body"></div>
    </div>

    <div id="options-container"></div>

    <div id="input-mode">
        <div style="background:#fff3cd; padding:10px; font-size:0.85rem; border-radius:5px; margin-bottom:10px;">
            🎤 提示：点击键盘上的<b>“麦克风”</b>图标即可开始语音背诵。完成后点击核对。
        </div>
        <textarea id="text-input" placeholder="请开始你的表演..."></textarea>
        <div id="diff-result"></div>
        <button id="check-btn" class="btn-main" onclick="compareText()">提交核对差异</button>
        <button id="final-submit" class="btn-main" style="display:none; background:#28a745;" onclick="finishAll()">确认完成并提交数据</button>
    </div>

    <script>
        const rawText = `永和九年，岁在癸丑，暮春之初，会于会稽山阴之兰亭，修禊事也。群贤毕至，少长咸集。此地有崇山峻岭，茂林修竹；又有清流激湍，映带左右，引以为流觞曲水，列坐其次。虽无丝竹管弦之盛，一觞一咏，亦足以畅叙幽情。
是日也，天朗气清，惠风和畅。仰观宇宙之大，俯察品类之盛，所以游目骋怀，足以极视听之娱，信可乐也。
夫人之相与，俯仰一世，或取诸怀抱，悟言一室之内；或因寄所托，放浪形骸之外。虽趣舍万殊，静躁不同，当其欣于所遇，暂得于己，快然自足，不知老之将至。及其所之既倦，情随事迁，感慨系之矣。向之所欣，俯仰之间，已为陈迹，犹不能不以之兴怀。况修短随化，终期于尽。古人云：“死生亦大矣。”岂不痛哉！
每览昔人兴感之由，若合一契，未尝不临文嗟悼，不能喻之于怀。固知一死生为虚诞，齐彭殇为妄作。后之视今，亦犹今之视昔，悲夫！故列叙时人，录其所述，虽世殊事异，所以兴怀，其致一也。后之览者，亦将有感于斯文。`;

        const charPool = [...new Set(rawText.replace(/[，。；？、〔〕“”\s]/g, "").split(''))];
        let currentLevel = 1;
        let allBlanks = [];
        let activeIndex = 0;
        let errorData = {}; // 任务1：后台统计对象

        function startLevel(l) {
            currentLevel = l;
            document.getElementById('choice-overlay').style.display = 'none';
            initLevel(l);
        }

        function initLevel(level) {
            const body = document.getElementById('content-body');
            const opts = document.getElementById('options-container');
            const inp = document.getElementById('input-mode');
            body.innerHTML = ''; opts.innerHTML = ''; allBlanks = []; activeIndex = 0;
            
            document.querySelectorAll('.node').forEach((n, i) => n.classList.toggle('active', i < level));
            document.getElementById('progress-active').style.width = (level - 1) * 20 + '%';
            document.getElementById('level-title').innerText = `第${level}关挑战中`;

            if (level >= 5) {
                opts.style.display = 'none'; inp.style.display = 'block';
                body.innerHTML = "<p style='color:#999; text-align:center;'>请根据记忆完成默写/语音输入</p>";
                return;
            }

            opts.style.display = 'flex'; inp.style.display = 'none';
            const rate = [0.1, 0.3, 0.6, 1.0][level-1];

            rawText.split('\n').forEach(para => {
                const p = document.createElement('p');
                para.split('').forEach(char => {
                    if (/[，。；？、〔〕“”\s]/.test(char)) {
                        p.appendChild(document.createTextNode(char));
                    } else if (Math.random() < rate || level === 4) {
                        const span = document.createElement('span');
                        span.className = 'blank';
                        span.dataset.ans = char;
                        p.appendChild(span);
                        allBlanks.push(span);
                    } else {
                        p.appendChild(document.createTextNode(char));
                    }
                });
                body.appendChild(p);
            });
            refreshUI();
        }

        function refreshUI() {
            if (activeIndex >= allBlanks.length) {
                if (currentLevel === 4) {
                    document.getElementById('choice-overlay').style.display = 'flex';
                } else {
                    alert("千里之行始于足下，还有最后一关哦");
                    startLevel(currentLevel + 1);
                }
                return;
            }
            allBlanks.forEach((b, i) => b.classList.toggle('active', i === activeIndex));
            const correct = allBlanks[activeIndex].dataset.ans;
            const options = [correct, ...charPool.filter(c => c !== correct).sort(() => Math.random() - 0.5).slice(0, 4)].sort(() => Math.random() - 0.5);
            
            const container = document.getElementById('options-container');
            container.innerHTML = '';
            options.forEach(c => {
                const btn = document.createElement('div');
                btn.className = 'option-btn'; btn.innerText = c;
                btn.onclick = () => {
                    if (c === correct) {
                        allBlanks[activeIndex].innerText = c;
                        allBlanks[activeIndex].className = 'blank filled';
                        activeIndex++; refreshUI();
                    } else {
                        // 任务1：记录易错点
                        errorData[correct] = (errorData[correct] || 0) + 1;
                        allBlanks[activeIndex].style.background = '#f2dede';
                        setTimeout(() => allBlanks[activeIndex-1 < activeIndex ? activeIndex : activeIndex].style.background = '', 400);
                    }
                };
                container.appendChild(btn);
            });
        }

        // 任务3：精准纠错比对
        function compareText() {
            const input = document.getElementById('text-input').value.trim();
            const target = rawText.replace(/\s+/g, "");
            const normalizedInput = input.replace(/\s+/g, "");
            
            let resultHTML = "";
            let i = 0, j = 0;
            const targetChars = target.split('');
            const inputChars = normalizedInput.split('');

            while (i < targetChars.length || j < inputChars.length) {
                if (targetChars[i] === inputChars[j]) {
                    resultHTML += `<span class="char-correct">${targetChars[i]}</span>`;
                    i++; j++;
                } else if (j >= inputChars.length) {
                    resultHTML += `<span class="char-missing">${targetChars[i]}</span>`;
                    i++;
                } else {
                    resultHTML += `<span class="char-error">${inputChars[j]}</span>`;
                    errorData[targetChars[i]] = (errorData[targetChars[i]] || 0) + 1;
                    j++; // 移动输入指针尝试匹配下一个
                }
            }
            
            const resDiv = document.getElementById('diff-result');
            resDiv.innerHTML = "<b>差异比对结果（红色为错字）：</b><br>" + resultHTML;
            resDiv.style.display = 'block';
            document.getElementById('final-submit').style.display = 'block';
            document.getElementById('check-btn').innerText = "重新检查";
        }

        function finishAll() {
            document.getElementById('info-overlay').style.display = 'flex';
        }

        function showCert() {
            const uClass = document.getElementById('u-class').value;
            const uName = document.getElementById('u-name').value;
            if (!uClass || !uName) return alert("请完整填写信息");
            
            document.getElementById('info-overlay').style.display = 'none';
            document.getElementById('c-info').innerText = `${uClass} ${uName}`;
            document.getElementById('c-date').innerText = new Date().toLocaleString();
            
            // 展示易错字
            const errors = Object.entries(errorData)
                .sort((a, b) => b[1] - a[1])
                .map(([char, count]) => `${char}(错${count}次)`)
                .join('，');
            document.getElementById('error-list').innerText = errors || "无（完美通关！）";
            
            document.getElementById('cert-overlay').style.display = 'flex';
        }

        initLevel(1);
    </script>
</body>
</html>
