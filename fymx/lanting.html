<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>《兰亭集序》翻译默写通关</title>
    <style>
        /* 颜色与字体设定 */
        :root {
            --bg-color: #F5F5EC;
            --text-main: #333333;
            --text-muted: #888888;
            --accent-green: #6A8B47;
            --line-color: #D3D3C8;
            --box-bg: #EAEAE0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: "STZhongsong", "SimSun", "Songti SC", serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        #app {
            width: 100%;
            max-width: 600px;
            padding: 20px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* ----- 首页选择界面 ----- */
        #start-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            flex: 1;
            margin-top: 40px;
            position: relative;
        }

        .back-to-main {
            position: absolute;
            top: -20px;
            left: 0;
            text-decoration: none;
            color: var(--text-muted);
            font-size: 16px;
            transition: color 0.3s ease;
        }
        
        .back-to-main:hover {
            color: var(--accent-green);
        }

        .main-title {
            font-size: 36px;
            font-weight: normal;
            margin-bottom: 10px;
            letter-spacing: 3px;
        }

        .sub-title {
            color: var(--text-muted);
            margin-bottom: 40px;
        }

        .mode-btn {
            background-color: transparent;
            color: var(--accent-green);
            border: 2px solid var(--accent-green);
            padding: 15px 30px;
            font-size: 18px;
            border-radius: 30px;
            margin: 15px 0;
            width: 80%;
            max-width: 300px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        .mode-btn:active {
            background-color: rgba(106, 139, 71, 0.1);
        }

        /* ----- 游戏界面 ----- */
        #game-screen {
            display: none; 
        }

        .header {
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            color: var(--text-muted);
            margin-bottom: 20px;
            margin-top: 10px;
        }

        .header-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            font-family: inherit;
            cursor: pointer;
            padding: 0;
            font-size: 14px;
        }

        .title-area {
            text-align: center;
            margin-bottom: 30px;
        }

        .title-area h1 {
            font-size: 28px;
            font-weight: normal;
            margin: 0 0 10px 0;
            letter-spacing: 2px;
        }

        .title-area p {
            font-size: 14px;
            color: var(--text-muted);
            margin: 0;
        }

        #level-badge {
            text-align: center;
            font-size: 16px;
            color: var(--accent-green);
            margin-bottom: 20px;
            font-weight: bold;
            letter-spacing: 1px;
        }

        .translation-box {
            font-size: 18px;
            line-height: 1.6;
            margin-bottom: 20px;
            color: var(--text-main);
            text-align: center;
            min-height: 50px;
        }

        .blanks-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            gap: 2px;
            font-size: 24px;
            margin-bottom: 30px;
            line-height: 2;
            background-color: var(--box-bg);
            border: 1px solid var(--line-color);
            border-radius: 8px;
            padding: 20px 10px;
            min-height: 40px;
            cursor: text; 
            box-shadow: inset 0 1px 3px rgba(0,0,0,0.05);
        }

        .char-box {
            display: inline-block;
            min-width: 24px;
            text-align: center;
            color: var(--text-muted); 
        }

        .char-blank {
            min-width: 24px;
            height: 30px;
            display: inline-block;
            border-bottom: 1px solid var(--text-muted); 
            margin: 0 2px;
        }

        .char-blank.active {
            border-bottom: 2px solid var(--accent-green);
            animation: blink 1s infinite;
        }

        @keyframes blink {
            0%, 100% { border-color: transparent; }
            50% { border-color: var(--accent-green); }
        }

        .punctuation {
            color: var(--text-muted);
            margin: 0 2px;
        }

        #user-input {
            position: absolute;
            left: -9999px;
            opacity: 0;
            width: 1px;
            height: 1px;
        }

        .nav-buttons {
            display: flex;
            justify-content: space-between;
            margin-top: 10px;
            width: 100%;
        }

        .nav-btn {
            background-color: transparent;
            color: var(--accent-green);
            border: 1px solid var(--accent-green);
            padding: 8px 20px;
            border-radius: 20px;
            font-size: 14px;
            cursor: pointer;
            font-family: inherit;
        }

        .nav-btn:disabled {
            color: var(--line-color);
            border-color: var(--line-color);
            cursor: not-allowed;
        }

        /* ----- 总结界面 ----- */
        #summary-screen {
            display: none;
            text-align: center;
            padding-bottom: 40px;
        }
        
        #evaluation-text {
            font-size: 18px;
            font-weight: bold;
            margin: 20px 0;
            padding: 15px;
            border-radius: 8px;
            background-color: #fff;
            border: 1px dashed var(--line-color);
        }

        .mistake-item {
            text-align: left;
            background: rgba(106, 139, 71, 0.1);
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 10px;
            font-size: 16px;
            line-height: 1.5;
        }

        .primary-btn {
            background-color: var(--accent-green);
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 16px;
            border-radius: 25px;
            margin-top: 20px;
            cursor: pointer;
            font-family: inherit;
        }
    </style>
</head>
<body>

<div id="app">
    <div id="start-screen">
        <a href="index.html" class="back-to-main">← 返回总目录</a>

        <h1 class="main-title">兰亭集序</h1>
        <p class="sub-title">默写通关挑战</p>
        
        <p style="font-size: 14px; color: #d9534f; margin-bottom: 20px; text-align: center; padding: 0 20px;">
            提示：建议使用<strong>手写键盘</strong>练习以增强记忆。
        </p>

        <button class="mode-btn" onclick="initGame(1)">顺序全文默写</button>
        <button class="mode-btn" onclick="initGame(2)">随机乱序挑战</button>
    </div>

    <div id="game-screen">
        <div class="header">
            <button class="header-btn" onclick="returnToStart()">← 返回模式选择</button>
            <span id="progress-text">进度：1/8</span>
        </div>

        <div class="title-area">
            <h1>兰亭集序</h1>
            <p>王羲之〔魏晋〕</p>
        </div>
        
        <div id="level-badge">当前模式：顺序全文默写</div>

        <div class="translation-box" id="translation"></div>

        <div class="blanks-container" id="blanks" onclick="focusInput()"></div>

        <input type="text" id="user-input" 
               autocomplete="off" 
               autocorrect="off" 
               autocapitalize="off" 
               spellcheck="false" 
               data-form-type="other">

        <div class="nav-buttons">
            <button id="btn-prev" class="nav-btn" onclick="goPrev()">上一句</button>
            <button id="btn-next" class="nav-btn" onclick="goNext()">下一句</button>
        </div>
    </div>

    <div id="summary-screen">
        <div class="title-area">
            <h1 id="summary-title">练习完成</h1>
            <p id="evaluation-text"></p>
            <p id="summary-subtitle">以下是本次错误超过3次的重点突破句子：</p>
        </div>
        <div id="mistakes-list"></div>
        <button class="primary-btn" onclick="returnToStart()">返回首页</button>
    </div>
</div>

<script>
    const fullData = [
    { orig: "永和九年，岁在癸丑，", trans: "永和九年，时在癸丑之年，" },
    { orig: "暮春之初，", trans: "三月上旬，" },
    { orig: "会于会稽山阴之兰亭，", trans: "我们会集在会稽郡山阴城的兰亭，" },
    { orig: "修禊事也。", trans: "为了做禊礼这件事。" },
    { orig: "群贤毕至，", trans: "诸多贤士能人都汇聚到这里，" },
    { orig: "少长咸集。", trans: "年长、年少者都聚集在这里。" },
    { orig: "此地有崇山峻岭，", trans: "兰亭这个地方有高峻的山峰，" },
    { orig: "茂林修竹；", trans: "茂盛高密的树林和竹丛；" },
    { orig: "又有清流激湍，", trans: "又有清澈激荡的水流，" },
    { orig: "映带左右，", trans: "在亭子的左右辉映环绕，" },
    { orig: "引以为流觞曲水，", trans: "我们把水引来作为漂传酒杯的环形渠水，" },
    { orig: "列坐其次。", trans: "排列坐在曲水旁边，" },
    { orig: "虽无丝竹管弦之盛，", trans: "虽然没有管弦齐奏的盛况，" },
    { orig: "一觞一咏，", trans: "但喝着酒作着诗，" },
    { orig: "亦足以畅叙幽情。", trans: "也足够来畅快表达幽深内藏的感情了。" },
    { orig: "是日也，", trans: "这一天，" },
    { orig: "天朗气清，", trans: "天气晴朗，" },
    { orig: "惠风和畅。", trans: "和风习习，" },
    { orig: "仰观宇宙之大，", trans: "抬头纵观广阔的天空，" },
    { orig: "俯察品类之盛，", trans: "俯看观察大地上繁多的万物，" },
    { orig: "所以游目骋怀，", trans: "用来舒展眼力，开阔胸怀，" },
    { orig: "足以极视听之娱，", trans: "足够来极尽视听的欢娱，" },
    { orig: "信可乐也。", trans: "实在很快乐。" },
    { orig: "夫人之相与，", trans: "人与人相互交往，" },
    { orig: "俯仰一世，", trans: "很快便度过一生，" },
    { orig: "或取诸怀抱，", trans: "有的人在室内畅谈自己的胸怀抱负；" },
    { orig: "悟言一室之内；", trans: "有的人在室内畅谈自己的胸怀抱负；" },
    { orig: "或因寄所托，", trans: "有的人就着自己所爱好的事物，寄托自己的情怀，" },
    { orig: "放浪形骸之外。", trans: "不受约束，放纵无羁的生活。" },
    { orig: "虽趣舍万殊，", trans: "虽然各有各的爱好，" },
    { orig: "静躁不同，", trans: "安静与躁动各不相同，" },
    { orig: "当其欣于所遇，", trans: "但当他们对所接触的事物感到高兴时，" },
    { orig: "暂得于己，", trans: "一时感到自得，" },
    { orig: "快然自足，", trans: "感到高兴和满足，" },
    { orig: "不知老之将至。", trans: "不知道衰老将要到来。" },
    { orig: "及其所之既倦，", trans: "等到对于自己所喜爱的事物感到厌倦，" },
    { orig: "情随事迁，", trans: "心情随着当前的境况而变化，" },
    { orig: "感慨系之矣。", trans: "感慨随之产生了。" },
    { orig: "向之所欣，", trans: "过去所喜欢的东西，" },
    { orig: "俯仰之间，", trans: "转瞬间，" },
    { orig: "已为陈迹，", trans: "已经成为旧迹，" },
    { orig: "犹不能不以之兴怀。", trans: "尚且不能不因为它引发心中的感触。" },
    { orig: "况修短随化，", trans: "况且寿命长短，听凭造化，" },
    { orig: "终期于尽。", trans: "最后归结于消灭。" },
    { orig: "古人云：“死生亦大矣。”", trans: "古人说：“死生毕竟是件大事啊。”" },
    { orig: "岂不痛哉！", trans: "怎么能不让人悲痛呢？" },
    { orig: "每览昔人兴感之由，", trans: "每当我看到前人兴怀感慨的原因，" },
    { orig: "若合一契，", trans: "与我所感叹的好像符契一样相合，" },
    { orig: "未尝不临文嗟悼，", trans: "没有不面对着他们的文章而嗟叹感伤的，" },
    { orig: "不能喻之于怀。", trans: "在心里又不能清楚地说明。" },
    { orig: "固知一死生为虚诞，", trans: "本来知道把生死等同的说法是不真实的，" },
    { orig: "齐彭殇为妄作。", trans: "把长寿和短命等同起来的说法是妄造的。" },
    { orig: "后之视今，", trans: "后人看待今人，" },
    { orig: "亦犹今之视昔，", trans: "也就像今人看待前人。" },
    { orig: "悲夫！", trans: "可悲呀！" },
    { orig: "故列叙时人，", trans: "所以一个一个记下当时与会的人，" },
    { orig: "录其所述，", trans: "录下他们所作的诗篇。" },
    { orig: "虽世殊事异，", trans: "纵使时代变了，事情不同了，" },
    { orig: "所以兴怀，", trans: "但触发人们情怀的原因，" },
    { orig: "其致一也。", trans: "他们的思想情趣是一样的。" },
    { orig: "后之览者，", trans: "后世的读者，" },
    { orig: "亦将有感于斯文。", trans: "也将对这次集会的诗文有所感慨。" }
    ];

    let currentData = []; 
    let currentIndex = 0;
    let highestIndex = 0; 
    let typedProgress = []; 
    let currentLevel = 1; 

    let mistakeCounter = {}; 
    let currentSessionMistakes = new Set(); 
    let autoInputCount = 0; 

    const transEl = document.getElementById('translation');
    const blanksEl = document.getElementById('blanks');
    const inputEl = document.getElementById('user-input');
    const progressEl = document.getElementById('progress-text');
    const levelBadgeEl = document.getElementById('level-badge');
    const btnPrev = document.getElementById('btn-prev');
    const btnNext = document.getElementById('btn-next');
    const evalEl = document.getElementById('evaluation-text');

    let isComposing = false; 

    function getPureChars(str) {
        return str.replace(/[，。；？！、\s]/g, '');
    }

    function shuffleArray(array) {
        let newArr = [...array];
        for (let i = newArr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [newArr[i], newArr[j]] = [newArr[j], newArr[i]];
        }
        return newArr;
    }

    function focusInput() {
        if (currentIndex >= highestIndex) {
            inputEl.focus();
        }
    }

    function returnToStart() {
        document.getElementById('start-screen').style.display = 'flex';
        document.getElementById('game-screen').style.display = 'none';
        document.getElementById('summary-screen').style.display = 'none';
        
        mistakeCounter = {};
        currentSessionMistakes.clear();
        autoInputCount = 0;
    }

    function initGame(level) {
        document.getElementById('start-screen').style.display = 'none';
        document.getElementById('summary-screen').style.display = 'none';
        document.getElementById('game-screen').style.display = 'block';
        
        currentLevel = level;
        currentIndex = 0;
        highestIndex = 0;
        autoInputCount = 0;
        mistakeCounter = {};
        currentSessionMistakes.clear();
        typedProgress = new Array(fullData.length).fill("");

        let baseData = fullData.map((item, index) => ({...item, originalIndex: index}));

        if (currentLevel === 1) {
            levelBadgeEl.innerText = "当前模式：顺序全文默写";
            currentData = baseData;
        } else if (currentLevel === 2) {
            levelBadgeEl.innerText = "当前模式：随机乱序挑战";
            currentData = shuffleArray(baseData);
        }

        loadSentence();
    }

    function loadSentence() {
        const currentItem = currentData[currentIndex];
        transEl.innerText = currentItem.trans;
        progressEl.innerText = `进度：${currentIndex + 1}/${currentData.length}`;
        
        if (currentIndex < highestIndex) {
            const origPure = getPureChars(currentItem.orig);
            inputEl.value = origPure;
            renderBlanks(origPure, true); 
        } else {
            inputEl.value = typedProgress[currentIndex];
            renderBlanks(typedProgress[currentIndex], false);
            setTimeout(() => focusInput(), 100);
        }

        updateNavButtons();
    }

    function renderBlanks(typedPureChars, isCompleted) {
        const origText = currentData[currentIndex].orig;
        blanksEl.innerHTML = "";
        let charIndex = 0; 

        for (let i = 0; i < origText.length; i++) {
            const char = origText[i];
            const isPunctuation = /[，。；？！、\s]/.test(char);
            const span = document.createElement('span');
            
            if (isPunctuation) {
                span.className = "char-box punctuation";
                span.innerText = char;
            } else {
                span.className = "char-box char-blank";
                
                if (charIndex < typedPureChars.length) {
                    span.innerText = typedPureChars[charIndex];
                    span.style.borderBottom = "none";
                    span.style.color = "#8A8A80"; 
                } else {
                    span.innerText = "";
                    if (!isCompleted && charIndex === typedPureChars.length) {
                        span.classList.add('active');
                    }
                }
                charIndex++;
            }
            blanksEl.appendChild(span);
        }
    }

    function updateNavButtons() {
        btnPrev.disabled = (currentIndex === 0);
        if (currentIndex < highestIndex) {
            btnNext.disabled = false;
            if (currentIndex === currentData.length - 1) {
                btnNext.innerText = "查看总结"; 
            } else {
                btnNext.innerText = "下一句";
            }
        } else {
            btnNext.disabled = true;
            btnNext.innerText = "下一句";
        }
    }

    function goPrev() {
        if (currentIndex > 0) {
            currentIndex--;
            loadSentence();
        }
    }

    function goNext() {
        if (currentIndex < currentData.length - 1) {
            currentIndex++;
            loadSentence();
        } else if (currentIndex === currentData.length - 1 && highestIndex === currentData.length) {
            showSummary(); 
        }
    }

    // 输入法逻辑（兼容拼音及手写）
    inputEl.addEventListener('compositionstart', () => { isComposing = true; });
    inputEl.addEventListener('compositionend', () => { 
        isComposing = false; 
        handleInputValidation(); 
    });
    inputEl.addEventListener('input', () => { 
        if (!isComposing) handleInputValidation(); 
    });

        function handleInputValidation() {
        if (currentIndex < highestIndex) return; 

        const origIndex = currentData[currentIndex].originalIndex;
        const origPureChars = getPureChars(currentData[currentIndex].orig);
        const rawVal = inputEl.value;
        const currentProgress = typedProgress[currentIndex];
        
        let isValid = false;
        let newProgress = currentProgress;

        // 核心修复：兼容手写与拼音的双重判断逻辑
        
        // 情况1：拼音键盘（正常拼接了之前的内容，比如传进来的是 "永和"）
        if (origPureChars.startsWith(rawVal)) {
            // 只要不是按了删除键，就判定为正确
            if (rawVal.length >= currentProgress.length) {
                isValid = true;
                newProgress = rawVal;
            } else {
                inputEl.value = currentProgress; // 忽略删除操作
                return;
            }
        } 
        // 情况2：手写键盘（丢失了前面的字，只传进来了新写的字，比如传进来的只有 "和"）
        else {
            const expectedRemainder = origPureChars.substring(currentProgress.length);
            // 检查：新写进来的字，是不是紧接着该出现的字？
            if (rawVal.length > 0 && expectedRemainder.startsWith(rawVal)) {
                isValid = true;
                newProgress = currentProgress + rawVal; // 手动把前面的进度拼接起来
            }
            // 情况3：极致兼容（只要键盘传进来的最后一个字是正确的，就算对）
            else if (rawVal.length > 0 && rawVal.charAt(rawVal.length - 1) === origPureChars.charAt(currentProgress.length)) {
                isValid = true;
                newProgress = currentProgress + rawVal.charAt(rawVal.length - 1);
            }
        }

        if (isValid) {
            // 检测是否自动填入了3个字及以上（针对联想作弊检测）
            const newLen = newProgress.length;
            const previousLen = currentProgress.length;
            if (newLen > previousLen && (newLen - previousLen) >= 3) {
                autoInputCount++;
            }

            // 更新输入进度
            typedProgress[currentIndex] = newProgress;
            inputEl.value = newProgress; // 强制同步给底层输入框，防止手写键盘错乱
            renderBlanks(newProgress, false);
            
            // 判断这句是否全部打完
            if (newProgress === origPureChars) {
                highestIndex = Math.max(highestIndex, currentIndex + 1);
                
                // 如果是最后一句，收起键盘
                if (currentIndex === currentData.length - 1) {
                    inputEl.blur(); 
                }
                
                renderBlanks(newProgress, true); 
                
                setTimeout(() => {
                    goNext();
                }, 400); 
            }
        } else {
            // 错误处理（错 3 次判定为错题）
            mistakeCounter[origIndex] = (mistakeCounter[origIndex] || 0) + 1;
            if (mistakeCounter[origIndex] >= 3) {
                currentSessionMistakes.add(origIndex);
            }
            
            // 强制撤回，恢复到正确进度
            inputEl.value = currentProgress;
        }
    }
    
    function showSummary() {
        document.getElementById('game-screen').style.display = 'none';
        document.getElementById('summary-screen').style.display = 'block';
        
        if (autoInputCount > 8) {
            evalEl.innerText = `千里之堤，溃于蚁穴。你用了 ${autoInputCount} 次自动输入。`;
            evalEl.style.color = "#d9534f"; 
        } else {
            evalEl.innerText = "千里之行，始于足下。一次次键盘的敲击，是你的努力可见。";
            evalEl.style.color = "var(--accent-green)"; 
        }

        const listEl = document.getElementById('mistakes-list');
        listEl.innerHTML = "";
        let mistakesArray = Array.from(currentSessionMistakes);

        if (mistakesArray.length > 0) {
            document.getElementById('summary-subtitle').innerText = "以下是本次练习中错误超过3次的句子：";
            mistakesArray.forEach(index => {
                const item = fullData[index];
                const div = document.createElement('div');
                div.className = "mistake-item";
                div.innerHTML = `<strong>原文：</strong>${item.orig}<br><span style="color:#666; font-size:14px;"><strong>译文：</strong>${item.trans}</span>`;
                listEl.appendChild(div);
            });
        } else {
            document.getElementById('summary-subtitle').innerText = "非常完美！全部通关且没有严重错误。";
        }
    }

    document.addEventListener('click', (e) => {
        const gameScreen = document.getElementById('game-screen');
        if (gameScreen.style.display !== 'none' && currentIndex < highestIndex) {
            if (e.target.tagName !== 'BUTTON') {
                focusInput();
            }
        }
    });

    window.onload = returnToStart;
</script>
</body>
</html>
